<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextPeriod | ASSAIDY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-default btn-default">
    <div class="main-wrapper">
        <div class="box header-box">
            <div class="center-branding">
                <h1 id="nav-title">نيكسيت بيريود</h1>
                <p id="nav-tagline">مؤقت الجرس الذكي</p>
                <p class="user-id">ASSAIDY</p>
            </div>
            
            <div class="controls-grid">
                <button class="control-btn" id="btn-color-toggle" onclick="nextBtnColor()">🔘</button>
                <button class="control-btn" id="btn-theme-toggle" onclick="nextFullTheme()">🎨</button>
                <button class="control-btn" onclick="toggleNightMode()">🌓</button>
                <button class="control-btn" onclick="toggleLanguage()">🌐</button>
            </div>
        </div>

        <div class="box main-timer">
            <p id="current-day-display">--</p>
            <p id="active-p-title">جاري التحميل...</p>
            <h2 id="live-counter">00:00:00</h2>
            <div class="progress-track"><div id="fill-bar"></div></div>
        </div>

        <div id="schedule-section">
            <div class="labels-grid">
                <span id="lbl-p">الحصة</span>
                <span id="lbl-s">المادة</span>
                <span id="lbl-tr">المعلم</span>
                <span id="lbl-t">الوقت</span>
                <span id="lbl-d">المدة</span>
                <span id="lbl-st">الحالة</span>
            </div>
            <div id="schedule-list"></div>
        </div>

        <div class="footer-info">
            <span id="footer-text">NextPeriod ©️ - تحديث تلقائي كل ثانية</span>
            <br><br>
            By: <a href="https://github.com/ahmedassaidy7-hash" target="_blank" class="my-link">ahmedassaidy7-hash</a>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
