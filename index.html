<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Period | Assaidy Schedule</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=Inter:wght@400;700&family=Syne:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="lang-switcher">
            <button onclick="setLanguage('en')">EN</button>
            <button onclick="setLanguage('ar')">AR</button>
            <button onclick="setLanguage('es')">ES</button>
        </div>

        <header>
            <h1 class="main-title">Next Period</h1>
            <p class="sub-title">Assaidy Schedule</p>
            <p id="current-day-status">Loading...</p>
        </header>

        <div class="timer-section">
            <div id="active-period-name">Checking...</div>
            <div id="timer">00:00:00</div>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>

        <div class="schedule-table">
            <table>
                <thead>
                    <tr id="table-head">
                        <th>Period</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="schedule-body"></tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
