<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextPeriod | ASSAIDY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="box header-box">
            <div class="header-container">
                <div class="center-branding">
                    <div class="logo-row">
                        <span class="big-clock">🕒</span>
                        <h1>NextPeriod</h1>
                    </div>
                    <p class="tagline">Smart Bell Schedule Countdown</p>
                    <p class="user-id">ASSAIDY</p>
                </div>
                <div class="bottom-left-controls">
                    <button class="control-btn" onclick="nextTheme()" title="تغيير الثيم">🎨</button>
                    <button class="control-btn" onclick="toggleNightMode()" title="الوضع الليلي">🌙</button>
                    <button class="control-btn" onclick="toggleLanguage()" title="اللغة">🌐</button>
                </div>
            </div>
        </div>

        <div class="box main-timer">
            <p id="current-day-display"></p>
            <p id="active-p-title">LOADING...</p>
            <h2 id="live-counter">00:00</h2>
            <div class="progress-track"><div id="fill-bar"></div></div>
            <p id="p-time-info">--:--</p>
        </div>

        <div class="labels-grid">
            <span id="lbl-p">Period</span>
            <span id="lbl-s">Subject</span>
            <span id="lbl-tr">Teacher & Room</span>
            <span id="lbl-t">Time</span>
            <span id="lbl-d">Dur</span>
            <span id="lbl-st">Status</span>
        </div>
        <div id="schedule-list"></div>

        <div class="footer-info">
            NextPeriod ©️ - Auto-updates every second. 
            Github: <a href="https://github.com/ahmedassaidy7-hash" target="_blank" class="my-link">ahmedassaidy7-hash</a>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
