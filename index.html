<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول حصص المنشئ الذكي</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>جدول حصص المنشئ</h1>
            <p id="current-day-status">يوم الجمعة - الاستعداد للدوام</p>
        </header>

        <div class="timer-section">
            <div id="active-period-name">جاري حساب الوقت...</div>
            <div id="timer">00:00:00</div>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>

        <div class="schedule-table">
            <table>
                <thead>
                    <tr>
                        <th>الحصة</th>
                        <th>الوقت</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="schedule-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
